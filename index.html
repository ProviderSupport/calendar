<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Provider Availability Calendar</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{--font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;--radius:6px;--text-primary:#111827;--text-secondary:#6b7280;--text-muted:#9ca3af;--text-accent:#2563eb;--text-success:#166534;--text-danger:#991b1b;--text-warning:#92400e;--border:#e5e7eb;--border-strong:#d1d5db;--border-accent:#bfdbfe;--border-success:#bbf7d0;--border-danger:#fecaca;--border-warning:#fde68a;--surface-1:#f9fafb;--surface-2:#ffffff;--bg-accent:#eff6ff;--bg-success:#dcfce7;--bg-danger:#fee2e2;--bg-warning:#fef3c7;--fill-accent:#2563eb;--on-accent:#ffffff;--fill-accent-hover:#1d4ed8}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:#f3f4f6;min-height:100vh;padding:2rem 1rem}
.container{max-width:700px;margin:0 auto;background:#fff;border-radius:12px;padding:2rem;box-shadow:0 1px 8px rgba(0,0,0,.08)}
h1{font-size:20px;font-weight:600;color:var(--text-primary);margin-bottom:4px}
.subtitle{font-size:13px;color:var(--text-secondary);margin-bottom:1.5rem}
.top-row{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;flex-wrap:wrap}
.top-row label{font-size:13px;color:var(--text-secondary)}
input[type=text],input[type=month]{font-family:var(--font-sans);font-size:14px;padding:6px 10px;border:0.5px solid var(--border-strong);border-radius:var(--radius);color:var(--text-primary);background:#fff;outline:none}
input[type=text]:focus,input[type=month]:focus{border-color:var(--fill-accent)}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.nav-row h2{font-size:16px;font-weight:500;color:var(--text-primary)}
.nav-btn{background:none;border:0.5px solid var(--border-strong);border-radius:var(--radius);padding:4px 10px;cursor:pointer;font-size:14px;color:var(--text-primary);font-family:var(--font-sans)}
.nav-btn:hover{background:var(--surface-1)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.dow{font-size:11px;color:var(--text-muted);text-align:center;padding:4px 0;font-weight:500}
.day{border:0.5px solid var(--border);border-radius:var(--radius);min-height:72px;padding:5px;cursor:pointer;background:#fff;transition:border-color .1s;position:relative}
.day:hover{border-color:var(--border-strong)}
.day.other-month{background:var(--surface-1);opacity:.4;cursor:default;pointer-events:none}
.day.today .day-num{color:var(--text-accent);font-weight:600}
.day.holiday{background:#ede9fe}
.day-num{font-size:12px;color:var(--text-secondary);margin-bottom:2px}
.holiday-name{font-size:9px;color:#7c3aed;line-height:1.2;margin-bottom:2px;font-weight:500}
.tag{font-size:9px;padding:2px 4px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;display:flex;align-items:center;justify-content:space-between;gap:2px}
.tag.avail{background:var(--bg-success);color:var(--text-success)}
.tag.ooo{background:var(--bg-danger);color:var(--text-danger)}
.tag.ooo-admin{background:var(--bg-warning);color:var(--text-warning)}
.tag-rm{background:none;border:none;cursor:pointer;color:inherit;opacity:.6;font-size:10px;line-height:1;padding:0;flex-shrink:0;display:none}
.tag-rm:hover{opacity:1}
.day:hover .tag-rm{display:inline}
.rm-day-btn{position:absolute;top:3px;right:3px;background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:13px;line-height:1;padding:1px 3px;border-radius:3px;display:none}
.rm-day-btn:hover{color:var(--text-danger);background:var(--bg-danger)}
.day:hover .rm-day-btn{display:block}
.panel{background:var(--surface-1);border:0.5px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-top:1rem}
.panel h3{font-size:14px;font-weight:500;color:var(--text-primary);margin-bottom:6px}
.panel-date{font-size:13px;color:var(--text-secondary);margin-bottom:8px}
.holiday-banner{font-size:12px;background:#ede9fe;color:#7c3aed;border-radius:var(--radius);padding:5px 9px;margin-bottom:10px;display:inline-block;border:0.5px solid #c4b5fd}
.pill-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.pill{padding:5px 12px;border-radius:99px;border:0.5px solid var(--border-strong);font-size:13px;cursor:pointer;color:var(--text-secondary);background:#fff;font-family:var(--font-sans)}
.pill.active-avail{background:var(--bg-success);border-color:var(--border-success);color:var(--text-success)}
.pill.active-ooo{background:var(--bg-danger);border-color:var(--border-danger);color:var(--text-danger)}
.pill.active-none{background:var(--surface-1);border-color:var(--border-strong);color:var(--text-primary)}
.shift-block{border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.shift-header{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:#fff;border-bottom:0.5px solid var(--border)}
.shift-title{display:flex;align-items:center;gap:8px}
.shift-num{font-size:11px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em}
.shift-saved-time{font-size:11px;background:var(--bg-success);color:var(--text-success);border-radius:4px;padding:2px 7px;font-weight:500}
.shift-saved-time.unsaved{background:var(--bg-warning);color:var(--text-warning)}
.shift-saved-time.new{background:var(--bg-accent);color:var(--text-accent)}
.shift-header-actions{display:flex;gap:6px;align-items:center}
.shift-del-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:12px;padding:3px 6px;border-radius:3px;display:flex;align-items:center;gap:3px;font-family:var(--font-sans)}
.shift-del-btn:hover{color:var(--text-danger);background:var(--bg-danger)}
.shift-body{padding:10px 10px 8px}
.shift-row-inner{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tl{font-size:12px;color:var(--text-muted);min-width:30px}
.time-sel{font-family:var(--font-sans);font-size:13px;padding:4px 6px;border-radius:var(--radius);border:0.5px solid var(--border-strong);background:#fff;color:var(--text-primary);cursor:pointer}
.add-time-btn{font-family:var(--font-sans);font-size:12px;padding:4px 12px;border-radius:var(--radius);border:0.5px solid var(--border-success);background:var(--bg-success);color:var(--text-success);cursor:pointer;font-weight:500}
.add-time-btn:hover{opacity:.85}
.update-shift-btn{font-family:var(--font-sans);font-size:12px;padding:4px 12px;border-radius:var(--radius);border:0.5px solid var(--border-warning);background:var(--bg-warning);color:var(--text-warning);cursor:pointer;font-weight:500}
.update-shift-btn:hover{opacity:.85}
.add-btn{background:none;border:0.5px dashed var(--border-strong);border-radius:var(--radius);width:100%;padding:6px;font-size:12px;color:var(--text-accent);cursor:pointer;margin-top:4px;font-family:var(--font-sans)}
.add-btn:hover{background:var(--bg-accent)}
.admin-block{background:#fff;border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:10px}
.admin-question{font-size:13px;font-weight:500;color:var(--text-primary);margin-bottom:3px}
.admin-examples{font-size:11px;color:var(--text-muted);margin-bottom:8px}
.admin-radio-row{display:flex;gap:12px}
.admin-radio-row label{display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer;color:var(--text-primary)}
.section-label{font-size:11px;color:var(--text-muted);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.legend{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-secondary)}
.leg-dot{width:10px;height:10px;border-radius:50%}
.summary-card{background:var(--surface-1);border:0.5px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-top:1rem}
.summary-card h3{font-size:14px;font-weight:500;margin-bottom:10px}
.action-row{display:flex;gap:8px;align-items:center;margin-top:14px;flex-wrap:wrap}
.action-label{font-size:11px;color:var(--text-muted);width:100%;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em;font-weight:500}
.btn-primary{background:#166534;color:#fff;border:none;border-radius:var(--radius);padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font-sans);display:flex;align-items:center;gap:6px}
.btn-primary:hover{opacity:.9}
.btn-primary.loading{opacity:.6;pointer-events:none}
.share-banner{background:var(--bg-accent);border:0.5px solid var(--border-accent);border-radius:var(--radius);padding:10px 14px;margin-bottom:1rem;font-size:13px;color:var(--text-accent);display:none;align-items:center;gap:8px}
.share-banner.show{display:flex}
.recur-box{background:var(--bg-accent);border:0.5px solid var(--border-accent);border-radius:var(--radius);padding:10px 12px;margin-top:10px}
.recur-box .rb-title{font-size:13px;font-weight:500;color:var(--text-accent);margin-bottom:8px}
.mini-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:10px}
.mini-dow{font-size:10px;color:var(--text-muted);text-align:center;padding:2px 0}
.mini-day{font-size:11px;text-align:center;padding:4px 2px;border-radius:4px;cursor:pointer;color:var(--text-secondary);border:0.5px solid transparent}
.mini-day:hover{background:var(--surface-1);border-color:var(--border)}
.mini-day.other{opacity:.3;pointer-events:none}
.mini-day.is-source{background:var(--bg-success);color:var(--text-success);border-color:var(--border-success)}
.mini-day.selected{background:var(--fill-accent);color:#fff}
.apply-recur-btn{background:var(--fill-accent);color:#fff;border:none;border-radius:var(--radius);padding:7px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font-sans)}
.apply-recur-btn:hover{opacity:.9}
.recur-note{font-size:11px;color:var(--text-accent);margin-top:6px}
.panel-footer{display:flex;gap:8px;margin-top:12px;padding-top:10px;border-top:0.5px solid var(--border);align-items:center}
.success-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--fill-accent);color:#fff;padding:8px 20px;border-radius:99px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap;font-family:var(--font-sans)}
.success-toast.show{opacity:1}
button{font-family:var(--font-sans)}
</style>
</head>
<body>
<div class="container" id="main-container">
  <h1>Hone: Provider Availability Calendar</h1>
  <p class="subtitle">Fill out your availability and time off, then share with the Provider Support team at <a href="mailto:providers@honehealth.zendesk.com" style="color:var(--text-accent)">providers@honehealth.zendesk.com</a></p>
  <div class="share-banner" id="share-banner">
    <i class="ti ti-info-circle" style="font-size:16px;flex-shrink:0"></i>
    <span id="share-banner-text"></span>
  </div>
  <div class="top-row">
    <div><label>Provider name</label><br><input type="text" id="prov-name" style="margin-top:4px;width:200px"></div>
    <div><label>Month</label><br><input type="month" id="month-pick" style="margin-top:4px;width:160px"></div>
  </div>
  <div class="nav-row">
    <button class="nav-btn" onclick="changeMonth(-1)"><i class="ti ti-arrow-left"></i></button>
    <h2 id="month-label"></h2>
    <button class="nav-btn" onclick="changeMonth(1)"><i class="ti ti-arrow-right"></i></button>
  </div>
  <div class="cal-grid" id="cal-grid">
    <div class="dow">Sun</div><div class="dow">Mon</div><div class="dow">Tue</div>
    <div class="dow">Wed</div><div class="dow">Thu</div><div class="dow">Fri</div><div class="dow">Sat</div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="leg-dot" style="background:#dcfce7;border:1px solid #bbf7d0"></div>Available</div>
    <div class="legend-item"><div class="leg-dot" style="background:#fee2e2;border:1px solid #fecaca"></div>OOO</div>
    <div class="legend-item"><div class="leg-dot" style="background:#fef3c7;border:1px solid #fde68a"></div>OOO + admin</div>
    <div class="legend-item"><div class="leg-dot" style="background:#ede9fe;border:1px solid #c4b5fd"></div>Federal holiday</div>
    <div class="legend-item" style="color:#9ca3af">Hover → ✕ removes</div>
  </div>
  <div id="day-panel" style="display:none"></div>
  <div id="summary-section"></div>
</div>
<div class="success-toast" id="toast"></div>
<script>
const today=new Date();
let currentYear=today.getFullYear(),currentMonth=today.getMonth();
let selectedDate=null,currentPanelType='none';
let selectedSpecificDays=new Set(),oooSelectedSpecificDays=new Set();
const dayData={};
const DOWS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DOW_SHORT=['Su','Mo','Tu','We','Th','Fr','Sa'];
const ORDINALS=['1st','2nd','3rd','4th','5th','6th'];

function p2(n){return String(n).padStart(2,'0');}
function nthWD(y,m,wd,n){let c=0,dm=new Date(y,m+1,0).getDate();for(let d=1;d<=dm;d++){if(new Date(y,m,d).getDay()===wd){c++;if(c===n)return d;}}return -1;}
function lastWD(y,m,wd){let dm=new Date(y,m+1,0).getDate();for(let d=dm;d>=1;d--){if(new Date(y,m,d).getDay()===wd)return d;}return -1;}
function getFederalHolidays(y){
  const h={};
  function add(mo,dy,name){const dow=new Date(y,mo,dy).getDay();let om=mo,od=dy;if(dow===0)od++;else if(dow===6){od--;if(od<1){om--;od=new Date(y,mo,0).getDate();}}h[`${y}-${p2(om+1)}-${p2(od)}`]=name;}
  add(0,1,"New Year's Day");h[`${y}-01-${p2(nthWD(y,0,1,3))}`]="MLK Jr. Day";h[`${y}-02-${p2(nthWD(y,1,1,3))}`]="Presidents' Day";
  h[`${y}-05-${p2(lastWD(y,4,1))}`]="Memorial Day";
  const jd=new Date(y,5,19).getDay();h[`${y}-06-${p2(jd===0?20:jd===6?18:19)}`]="Juneteenth";
  add(6,4,"Independence Day");h[`${y}-09-${p2(nthWD(y,8,1,1))}`]="Labor Day";h[`${y}-10-${p2(nthWD(y,9,1,2))}`]="Columbus Day";
  add(10,11,"Veterans Day");h[`${y}-11-${p2(nthWD(y,10,4,4))}`]="Thanksgiving";add(11,25,"Christmas Day");
  return h;
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function dateKey(y,m,d){return `${y}-${p2(m+1)}-${p2(d)}`;}
function getDOW(key){return new Date(key+'T00:00:00').getDay();}
function fmtFull(t){if(!t)return'?';const[h,m]=t.split(':');const hr=+h;return((hr%12)||12)+':'+m+' '+(hr>=12?'PM':'AM');}
function fmtTag(s,e){function f(t){if(!t)return'?';const[h,m]=t.split(':');const hr=+h;return((hr%12)||12)+(m==='00'?'':':'+m)+(hr>=12?'pm':'am');}return f(s)+'–'+f(e);}
function sortShifts(shifts){return shifts.sort((a,b)=>{const ta=+a.start.split(':')[0]*60+ +a.start.split(':')[1];const tb=+b.start.split(':')[0]*60+ +b.start.split(':')[1];return ta-tb;});}

// URL encode/decode
function encodeState(){const state={name:document.getElementById('prov-name').value||'',year:currentYear,month:currentMonth,days:dayData};return btoa(encodeURIComponent(JSON.stringify(state)));}
function decodeState(enc){try{return JSON.parse(decodeURIComponent(atob(enc)));}catch(e){return null;}}
function loadFromURL(){
  const d=new URLSearchParams(location.search).get('d');if(!d)return;
  const state=decodeState(d);if(!state)return;
  if(state.name)document.getElementById('prov-name').value=state.name;
  if(state.year!=null)currentYear=state.year;
  if(state.month!=null)currentMonth=state.month;
  if(state.days)Object.assign(dayData,state.days);
  document.getElementById('month-pick').value=`${currentYear}-${p2(currentMonth+1)}`;
  const banner=document.getElementById('share-banner');
  document.getElementById('share-banner-text').textContent=`Viewing ${state.name||'provider'}'s submitted availability.`;
  banner.classList.add('show');
}

// Share actions
function downloadPDF(){
  const btn=document.getElementById('pdf-btn');btn.classList.add('loading');btn.innerHTML='<i class="ti ti-loader" style="font-size:14px"></i> Generating…';
  closePanel();
  html2canvas(document.getElementById('main-container'),{scale:2,backgroundColor:'#ffffff',useCORS:true}).then(canvas=>{
    const{jsPDF}=window.jspdf;const pdf=new jsPDF({orientation:'portrait',unit:'pt',format:'a4'});
    const pw=pdf.internal.pageSize.getWidth();const iw=pw-40;const ih=(canvas.height/canvas.width)*iw;
    pdf.addImage(canvas.toDataURL('image/png'),'PNG',20,20,iw,ih);
    const name=(document.getElementById('prov-name').value||'availability').replace(/\s+/g,'_');
    const mo=getMonthLabel().replace(/[\/\s]+/g,'_');
    pdf.save(`${name}_${mo}.pdf`);
    btn.classList.remove('loading');btn.innerHTML='<i class="ti ti-file-type-pdf" style="font-size:14px"></i> Download PDF';
    showToast('PDF downloaded ✓');
  });
}
function getMonthLabel(){
  const keys=Object.keys(dayData).filter(k=>dayData[k]&&dayData[k].type&&dayData[k].type!=='none').sort();
  if(!keys.length)return new Date(currentYear,currentMonth,1).toLocaleString('default',{month:'long',year:'numeric'});
  const seen=new Map();
  keys.forEach(k=>{const[y,m]=k.split('-');const ym=`${y}-${m}`;if(!seen.has(ym))seen.set(ym,new Date(+y,+m-1,1));});
  const dates=[...seen.values()].sort((a,b)=>a-b);
  if(dates.length===1)return dates[0].toLocaleString('default',{month:'long',year:'numeric'});
  const years=[...new Set(dates.map(d=>d.getFullYear()))];
  if(years.length===1)return dates.map(d=>d.toLocaleString('default',{month:'long'})).join('/')+' '+years[0];
  return dates.map(d=>d.toLocaleString('default',{month:'long',year:'numeric'})).join(' / ');
}
function sendEmail(){
  const name=document.getElementById('prov-name').value||'Provider';
  const ml=getMonthLabel();
  const hols=getFederalHolidays(currentYear);
  const keys=Object.keys(dayData).filter(k=>dayData[k]&&dayData[k].type&&dayData[k].type!=='none').sort();
  let body=`Availability Submission — ${ml}\nProvider: ${name}\n\n`;
  const avail=keys.filter(k=>dayData[k].type==='avail');
  const ooo=keys.filter(k=>dayData[k].type==='ooo');
  if(avail.length){body+='AVAILABLE DAYS\n';avail.forEach(k=>{const[ky,km,kd]=k.split('-');const hols2=getFederalHolidays(+ky);const d=dayData[k];const dt=new Date(+ky,+km-1,+kd).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});const shifts=d.shifts.map(s=>`${fmtFull(s.start)}–${fmtFull(s.end)}`).join(', ')||'TBD';body+=`  ${dt}${hols2[k]?' ['+hols2[k]+']':''}: ${shifts}\n`;});}
  if(ooo.length){body+='\nTIME OFF\n';ooo.forEach(k=>{const[ky,km,kd]=k.split('-');const hols2=getFederalHolidays(+ky);const d=dayData[k];const dt=new Date(+ky,+km-1,+kd).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});body+=`  ${dt}${hols2[k]?' ['+hols2[k]+']':''}: OOO — ${d.adminAvail?'yes, available for admin tasks':'no, not available for admin tasks'}\n`;});}
  const subject=encodeURIComponent(`Availability Submission — ${ml}`);
  window.location.href=`mailto:providers@honehealth.zendesk.com?subject=${subject}&body=${encodeURIComponent(body)}`;
}

const mp=document.getElementById('month-pick');
mp.value=`${currentYear}-${p2(currentMonth+1)}`;
mp.addEventListener('change',e=>{const[y,m]=e.target.value.split('-');currentYear=+y;currentMonth=+m-1;closePanel();refresh();});
function changeMonth(d){currentMonth+=d;if(currentMonth>11){currentMonth=0;currentYear++;}if(currentMonth<0){currentMonth=11;currentYear--;}mp.value=`${currentYear}-${p2(currentMonth+1)}`;closePanel();refresh();}

function makeTimeSelect(id,val){
  let s=`<select class="time-sel" id="${id}" onchange="onSelectChange('${id}')">`;
  const[ch,cm]=(val||'08:00').split(':');
  for(let h=0;h<24;h++)for(const m of['00','15','30','45']){const v=`${p2(h)}:${m}`;s+=`<option value="${v}"${+ch===h&&cm===m?' selected':''}>${fmtFull(v)}</option>`;}
  return s+'</select>';
}
function onSelectChange(id){
  const parts=id.split('-');const idx=+parts[1];
  const btn=document.getElementById(`update-btn-${idx}`);
  if(btn){btn.textContent='Update time';btn.className='update-shift-btn';}
}

function removeShiftFromDay(key,idx,e){
  e.stopPropagation();if(!dayData[key])return;
  dayData[key].shifts.splice(idx,1);
  if(!dayData[key].shifts.length)delete dayData[key];
  if(selectedDate===key){dayData[key]?rebuildShiftListOnly():closePanel();}
  refresh();
}
function removeDay(e,key){e.stopPropagation();delete dayData[key];if(selectedDate===key)closePanel();refresh();}

function refresh(){
  // render calendar
  const hols=getFederalHolidays(currentYear);
  document.getElementById('month-label').textContent=new Date(currentYear,currentMonth,1).toLocaleString('default',{month:'long',year:'numeric'});
  const grid=document.getElementById('cal-grid');grid.querySelectorAll('.day').forEach(c=>c.remove());
  const first=new Date(currentYear,currentMonth,1).getDay();
  const dim=new Date(currentYear,currentMonth+1,0).getDate();
  const prev=new Date(currentYear,currentMonth,0).getDate();
  for(let i=0;i<first;i++){const d=document.createElement('div');d.className='day other-month';d.innerHTML=`<div class="day-num">${prev-first+i+1}</div>`;grid.appendChild(d);}
  for(let i=1;i<=dim;i++){
    const key=dateKey(currentYear,currentMonth,i);const data=dayData[key];const hol=hols[key];
    const d=document.createElement('div');d.className='day';
    if(hol)d.classList.add('holiday');
    if(today.getFullYear()===currentYear&&today.getMonth()===currentMonth&&today.getDate()===i)d.classList.add('today');
    let inner=`<div class="day-num">${i}</div>`;
    if(hol)inner+=`<div class="holiday-name">${hol}</div>`;
    if(data&&data.type){
      if(data.type==='avail'&&data.shifts&&data.shifts.length){data.shifts.forEach((s,si)=>{inner+=`<div class="tag avail"><span style="overflow:hidden;text-overflow:ellipsis">${fmtTag(s.start,s.end)}</span><button class="tag-rm" onclick="removeShiftFromDay('${key}',${si},event)">✕</button></div>`;});}
      else if(data.type==='ooo'){inner+=data.adminAvail?`<div class="tag ooo-admin">OOO + admin</div>`:`<div class="tag ooo">OOO</div>`;}
      inner+=`<button class="rm-day-btn" onclick="removeDay(event,'${key}')">✕</button>`;
    }
    d.innerHTML=inner;d.addEventListener('click',()=>openPanel(i,key));grid.appendChild(d);
  }
  const rem=(7-(first+dim)%7)%7;for(let i=1;i<=rem;i++){const d=document.createElement('div');d.className='day other-month';d.innerHTML=`<div class="day-num">${i}</div>`;grid.appendChild(d);}

  // render summary
  const name=document.getElementById('prov-name').value||'—';
  const allKeys=Object.keys(dayData).filter(k=>dayData[k]&&dayData[k].type&&dayData[k].type!=='none').sort();
  const sec=document.getElementById('summary-section');
  if(!allKeys.length){sec.innerHTML='';return;}
  const avail=allKeys.filter(k=>dayData[k].type==='avail');
  const ooo=allKeys.filter(k=>dayData[k].type==='ooo');
  let html=`<div class="summary-card"><h3>Summary — ${name}</h3>`;
  if(avail.length){
    html+=`<div class="section-label" style="margin-bottom:6px">Available days</div>`;
    avail.forEach(k=>{
      const d=dayData[k];const dt=new Date(k+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
      const shifts=(d.shifts||[]).map(s=>`${fmtFull(s.start)}–${fmtFull(s.end)}`).join(' · ')||'TBD';
      const hol=hols[k]?`<span style="font-size:10px;background:#ede9fe;color:#7c3aed;border-radius:4px;padding:1px 5px;border:0.5px solid #c4b5fd">${hols[k]}</span>`:'';
      html+=`<div style="font-size:13px;padding:5px 0;border-bottom:0.5px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;gap:8px"><span style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;color:#111827">${dt} ${hol}</span><span style="color:#6b7280;font-size:12px">${shifts}</span></div>`;
    });
  }
  if(ooo.length){
    html+=`<div class="section-label" style="margin-top:12px;margin-bottom:6px">Time off</div>`;
    ooo.forEach(k=>{
      const d=dayData[k];const dt=new Date(k+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
      const hol=hols[k]?`<span style="font-size:10px;background:#ede9fe;color:#7c3aed;border-radius:4px;padding:1px 5px;border:0.5px solid #c4b5fd">${hols[k]}</span>`:'';
      const ab=d.adminAvail?`<span style="font-size:10px;background:#fef3c7;color:#92400e;border-radius:4px;padding:1px 5px">admin ok</span>`:'';
      html+=`<div style="font-size:13px;padding:5px 0;border-bottom:0.5px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;gap:8px"><span style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;color:#111827">${dt}${hol}${ab}</span></div>`;
    });
  }
  html+=`<div class="action-row">
    <div class="action-label">Share your availability</div>
    <div style="width:100%;background:#f0fdf4;border:0.5px solid #bbf7d0;border-radius:6px;padding:10px 14px;font-size:13px;color:#166534;display:flex;align-items:flex-start;gap:8px;margin-bottom:4px">
      <i class="ti ti-info-circle" style="font-size:16px;flex-shrink:0;margin-top:1px"></i>
      <span><strong>Three steps to submit:</strong><br>1) First click <em>Download PDF</em> to save your calendar.<br>2) Then, click <em>Send email to Hone</em> — your email app will open pre-filled.<br>3) Please attach the PDF before sending.</span>
    </div>
    <button class="btn-primary" id="pdf-btn" onclick="downloadPDF()"><i class="ti ti-file-type-pdf" style="font-size:14px"></i> Download PDF</button>
    <button class="btn-primary" onclick="sendEmail()"><i class="ti ti-send" style="font-size:14px"></i> Send email to Hone</button>
  </div></div>`;
  sec.innerHTML=html;
}

function shiftBlockHtml(s,idx,isNew){
  const ordinal=ORDINALS[idx]||`${idx+1}th`;
  const badgeCls=isNew?'shift-saved-time new':'shift-saved-time';
  const badgeLabel=isNew?'unsaved':fmtTag(s.start,s.end);
  const btnCls='add-time-btn';
  return `<div class="shift-block" id="shift-block-${idx}">
    <div class="shift-header">
      <div class="shift-title"><span class="shift-num">${ordinal} shift</span><span class="${badgeCls}">${badgeLabel}</span></div>
      <div class="shift-header-actions">
        <button class="${btnCls}" id="update-btn-${idx}" onclick="updateSingleShift(${idx})">Add time</button>
        <button class="shift-del-btn" onclick="deleteShiftInPanel(${idx})"><i class="ti ti-trash" style="font-size:12px"></i> Remove</button>
      </div>
    </div>
    <div class="shift-body">
      <div class="shift-row-inner">
        <span class="tl">Start</span>${makeTimeSelect(`sh-${idx}-s`,s.start)}
        <span class="tl" style="margin-left:4px">End</span>${makeTimeSelect(`sh-${idx}-e`,s.end)}
      </div>
    </div>
  </div>`;
}

function rebuildShiftListOnly(){
  if(!selectedDate||!dayData[selectedDate])return;
  const list=document.getElementById('shift-list');
  if(list)list.innerHTML=(dayData[selectedDate].shifts||[]).map((s,i)=>shiftBlockHtml(s,i,false)).join('');
}

function updateSingleShift(idx){
  if(!selectedDate)return;
  const sEl=document.getElementById(`sh-${idx}-s`);const eEl=document.getElementById(`sh-${idx}-e`);if(!sEl||!eEl)return;
  if(!dayData[selectedDate])dayData[selectedDate]={type:'avail',shifts:[],adminAvail:true};
  if(!dayData[selectedDate].shifts)dayData[selectedDate].shifts=[];
  while(dayData[selectedDate].shifts.length<=idx)dayData[selectedDate].shifts.push({start:'08:00',end:'17:00'});
  dayData[selectedDate].shifts[idx]={start:sEl.value,end:eEl.value};
  sortShifts(dayData[selectedDate].shifts);
  const badge=document.querySelector(`#shift-block-${idx} .shift-saved-time`);
  if(badge){badge.textContent=fmtTag(sEl.value,eEl.value);badge.classList.remove('unsaved','new');}
  const btn=document.getElementById(`update-btn-${idx}`);
  if(btn){btn.textContent='Add time';btn.className='add-time-btn';}
  refresh();showToast(`Shift ${idx+1} saved ✓`);
}

function deleteShiftInPanel(idx){
  if(!selectedDate||!dayData[selectedDate])return;
  commitAllSelects();
  dayData[selectedDate].shifts.splice(idx,1);
  if(!dayData[selectedDate].shifts.length)delete dayData[selectedDate];
  dayData[selectedDate]?rebuildShiftListOnly():closePanel();
  refresh();
}

function addShiftInPanel(){
  if(!selectedDate)return;
  commitAllSelects();
  if(!dayData[selectedDate])dayData[selectedDate]={type:'avail',shifts:[],adminAvail:true};
  if(!dayData[selectedDate].shifts)dayData[selectedDate].shifts=[];
  dayData[selectedDate].type='avail';
  const ns={start:'08:00',end:'17:00'};
  dayData[selectedDate].shifts.push(ns);
  const idx=dayData[selectedDate].shifts.length-1;
  const list=document.getElementById('shift-list');
  if(list){const div=document.createElement('div');div.innerHTML=shiftBlockHtml(ns,idx,true);list.appendChild(div.firstElementChild);}
  refresh();
}

function commitAllSelects(){
  if(!selectedDate||!dayData[selectedDate]||!dayData[selectedDate].shifts)return;
  dayData[selectedDate].shifts.forEach((_,i)=>{
    const sEl=document.getElementById(`sh-${i}-s`);const eEl=document.getElementById(`sh-${i}-e`);
    if(sEl)dayData[selectedDate].shifts[i].start=sEl.value;
    if(eEl)dayData[selectedDate].shifts[i].end=eEl.value;
  });
}

function getAllCurrentShifts(){
  if(!selectedDate||!dayData[selectedDate])return[];
  commitAllSelects();
  return (dayData[selectedDate].shifts||[]).map(s=>({...s}));
}

function buildMiniCal(sourceKey,prefix){
  const dim=new Date(currentYear,currentMonth+1,0).getDate();const first=new Date(currentYear,currentMonth,1).getDay();const prev=new Date(currentYear,currentMonth,0).getDate();
  const selSet=prefix==='ooo'?oooSelectedSpecificDays:selectedSpecificDays;
  let html='<div class="mini-cal">';DOW_SHORT.forEach(n=>{html+=`<div class="mini-dow">${n}</div>`;});
  for(let i=0;i<first;i++){html+=`<div class="mini-day other">${prev-first+i+1}</div>`;}
  for(let i=1;i<=dim;i++){const key=dateKey(currentYear,currentMonth,i);const isSrc=key===sourceKey;const isSel=selSet.has(key);let cls='mini-day';if(isSrc)cls+=' is-source';else if(isSel)cls+=' selected';html+=`<div class="${cls}"${isSrc?'':` onclick="${prefix}ToggleSpecific('${key}')"`}>${i}</div>`;}
  const rem=(7-(first+dim)%7)%7;for(let i=1;i<=rem;i++){html+=`<div class="mini-day other">${i}</div>`;}return html+'</div>';
}
function buildRecurBox(prefix,sourceKey){
  return `<div class="recur-box">
    <div class="rb-title"><i class="ti ti-repeat" style="font-size:14px"></i> Apply to other days</div>
    <div class="section-label" style="margin-bottom:6px;color:var(--text-accent)">By specific days</div>
    <div id="${prefix}-mini-cal-wrap">${buildMiniCal(sourceKey,prefix)}</div>
    <button class="apply-recur-btn" onclick="${prefix}ApplySpecific()">Apply to selected days</button>
    <div class="recur-note">Green = source. Blue = days to copy to.</div>
  </div>`;
}

function availToggleSpecific(key){if(selectedSpecificDays.has(key))selectedSpecificDays.delete(key);else selectedSpecificDays.add(key);const mc=document.getElementById('avail-mini-cal-wrap');if(mc)mc.innerHTML=buildMiniCal(selectedDate,'avail');}
function availApplySpecific(){
  if(!selectedDate||!selectedSpecificDays.size)return;
  const shifts=getAllCurrentShifts();sortShifts(shifts);
  dayData[selectedDate]={type:'avail',shifts:shifts.map(s=>({...s})),adminAvail:true};
  selectedSpecificDays.forEach(k=>{dayData[k]={type:'avail',shifts:shifts.map(s=>({...s})),adminAvail:true};});
  const count=selectedSpecificDays.size;closePanel();refresh();showToast(`Applied to ${count} day${count>1?'s':''} ✓`);
}
function oooToggleSpecific(key){if(oooSelectedSpecificDays.has(key))oooSelectedSpecificDays.delete(key);else oooSelectedSpecificDays.add(key);const mc=document.getElementById('ooo-mini-cal-wrap');if(mc)mc.innerHTML=buildMiniCal(selectedDate,'ooo');}
function oooApplySpecific(){
  if(!selectedDate||!oooSelectedSpecificDays.size)return;
  const adminEl=document.querySelector('input[name="admin"]:checked');const adminAvail=adminEl?.value!=='no';
  dayData[selectedDate]={type:'ooo',shifts:[],adminAvail};
  oooSelectedSpecificDays.forEach(k=>{dayData[k]={type:'ooo',shifts:[],adminAvail};});
  const count=oooSelectedSpecificDays.size;closePanel();refresh();showToast(`OOO applied to ${count} day${count>1?'s':''} ✓`);
}

function openPanel(dayNum,key){
  selectedDate=key;
  const hols=getFederalHolidays(currentYear);const hol=hols[key];
  const ex=dayData[key]?JSON.parse(JSON.stringify(dayData[key])):{type:'none',shifts:[{start:'08:00',end:'17:00'}],adminAvail:true};
  if(!ex.shifts||!ex.shifts.length)ex.shifts=[{start:'08:00',end:'17:00'}];
  if(!dayData[key])dayData[key]=JSON.parse(JSON.stringify(ex));
  currentPanelType=ex.type;
  selectedSpecificDays=new Set();oooSelectedSpecificDays=new Set();
  const dateLabel=new Date(currentYear,currentMonth,dayNum).toLocaleString('default',{weekday:'long',month:'long',day:'numeric'});
  const panel=document.getElementById('day-panel');panel.style.display='block';
  const shiftHtml=(ex.shifts||[]).map((s,i)=>shiftBlockHtml(s,i,false)).join('');
  panel.innerHTML=`<div class="panel">
    <h3>Set availability</h3>
    <div class="panel-date">${dateLabel}</div>
    ${hol?`<div class="holiday-banner"><i class="ti ti-building-bank" style="font-size:13px"></i> Federal holiday: ${hol}</div>`:''}
    <div class="section-label">Status</div>
    <div class="pill-row">
      <button class="pill ${ex.type==='avail'?'active-avail':''}" onclick="setType('avail')"><i class="ti ti-check" style="font-size:13px"></i> Available</button>
      <button class="pill ${ex.type==='ooo'?'active-ooo':''}" onclick="setType('ooo')"><i class="ti ti-palm-tree" style="font-size:13px"></i> OOO</button>
      <button class="pill ${ex.type==='none'?'active-none':''}" onclick="setType('none')">Clear</button>
    </div>
    <div id="avail-section" style="display:${ex.type==='avail'?'block':'none'}">
      <div class="section-label" style="margin-bottom:6px">Shifts <span style="font-size:10px;color:#9ca3af;text-transform:none;letter-spacing:0;font-weight:400">— edit then click Add time to save</span></div>
      <div id="shift-list">${shiftHtml}</div>
      <button class="add-btn" onclick="addShiftInPanel()"><i class="ti ti-plus"></i> Add shift</button>
      ${buildRecurBox('avail',key)}
    </div>
    <div id="ooo-section" style="display:${ex.type==='ooo'?'block':'none'}">
      <div class="admin-block">
        <div class="admin-question">Available for admin tasks?</div>
        <div class="admin-examples">e.g. reviewing lab results, approving Rxs, responding to emails</div>
        <div class="admin-radio-row">
          <label><input type="radio" name="admin" value="yes" ${ex.adminAvail!==false?'checked':''}> Yes</label>
          <label><input type="radio" name="admin" value="no" ${ex.adminAvail===false?'checked':''}> No</label>
        </div>
      </div>
      ${buildRecurBox('ooo',key)}
    </div>
    <div class="panel-footer">
      <button style="font-size:13px;padding:6px 16px;border-radius:6px;border:0.5px solid #d1d5db;background:#fff;cursor:pointer;font-family:inherit" onclick="saveDay()">Save & close</button>
      <button style="font-size:13px;padding:6px 12px;color:#6b7280;background:none;border:none;cursor:pointer;font-family:inherit" onclick="closePanel()">Cancel</button>
    </div>
  </div>`;
}

function setType(t){
  if(!selectedDate)return;
  currentPanelType=t;
  if(!dayData[selectedDate])dayData[selectedDate]={type:'none',shifts:[{start:'08:00',end:'17:00'}],adminAvail:true};
  dayData[selectedDate].type=t;
  openPanel(parseInt(selectedDate.split('-')[2]),selectedDate);
}

function saveDay(){
  if(!selectedDate)return;
  commitAllSelects();
  const type=currentPanelType;
  const adminEl=document.querySelector('input[name="admin"]:checked');
  if(type==='none'){
    delete dayData[selectedDate];
  } else if(type==='avail'){
    const shifts=dayData[selectedDate]?.shifts||[];
    sortShifts(shifts);
    dayData[selectedDate]={type:'avail',shifts,adminAvail:true};
  } else if(type==='ooo'){
    dayData[selectedDate]={type:'ooo',shifts:[],adminAvail:adminEl?.value!=='no'};
  }
  closePanel();
  refresh();
}

function closePanel(){document.getElementById('day-panel').style.display='none';selectedDate=null;currentPanelType='none';}

document.getElementById('prov-name').addEventListener('input',refresh);
loadFromURL();
refresh();
</script>
</body>
</html>
